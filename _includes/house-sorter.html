<div class="house-sorter" style="background-image: linear-gradient(rgba(12, 6, 24, .55), rgba(12, 6, 24, .8)), url('{{ site.baseurl }}/assets/lessons/harry-potter-project-launch/bg-space.jpg');">
  <div class="house-sorter-setup">
    <p class="house-sorter-title">The Sorting Ceremony</p>
    <label class="house-sorter-label" for="house-sorter-count">How many students are you sorting today?</label>
    <div class="house-sorter-setup-row">
      <input type="number" id="house-sorter-count" class="house-sorter-input" min="1" max="200" placeholder="e.g. 24">
      <button type="button" class="house-sorter-btn house-sorter-start-btn">Start Sorting</button>
    </div>
    <p class="house-sorter-hint">Houses are always split as evenly as possible &mdash; then each student gets their own spin.</p>
  </div>

  <div class="house-sorter-stage" hidden>
    <p class="house-sorter-progress"></p>

    <div class="house-sorter-wheel-wrap">
      <div class="house-sorter-pointer"></div>
      <svg class="house-sorter-wheel-svg" viewBox="0 0 300 300" aria-hidden="true">
        <defs>
          <clipPath id="house-sorter-badge-gryffindor"><circle cx="217.2" cy="82.8" r="32"></circle></clipPath>
          <clipPath id="house-sorter-badge-slytherin"><circle cx="217.2" cy="217.2" r="32"></circle></clipPath>
          <clipPath id="house-sorter-badge-hufflepuff"><circle cx="82.8" cy="217.2" r="32"></circle></clipPath>
          <clipPath id="house-sorter-badge-ravenclaw"><circle cx="82.8" cy="82.8" r="32"></circle></clipPath>
        </defs>
        <g class="house-sorter-wheel-disc">
          <path d="M150,150 L150,10 A140,140 0 0,1 290,150 Z" fill="#740001"></path>
          <path d="M150,150 L290,150 A140,140 0 0,1 150,290 Z" fill="#1a4d2e"></path>
          <path d="M150,150 L150,290 A140,140 0 0,1 10,150 Z" fill="#ecb939"></path>
          <path d="M150,150 L10,150 A140,140 0 0,1 150,10 Z" fill="#222f5b"></path>

          <line x1="150" y1="150" x2="150" y2="10" stroke="#d3a625" stroke-width="3"></line>
          <line x1="150" y1="150" x2="290" y2="150" stroke="#d3a625" stroke-width="3"></line>
          <line x1="150" y1="150" x2="150" y2="290" stroke="#d3a625" stroke-width="3"></line>
          <line x1="150" y1="150" x2="10" y2="150" stroke="#d3a625" stroke-width="3"></line>
          <circle cx="150" cy="150" r="145" fill="none" stroke="#d3a625" stroke-width="6"></circle>

          <image href="{{ site.baseurl }}/assets/lessons/harry-potter-project-launch/crest-gryffindor.png" x="185.2" y="50.8" width="64" height="64" preserveAspectRatio="xMidYMid slice" clip-path="url(#house-sorter-badge-gryffindor)"></image>
          <circle cx="217.2" cy="82.8" r="32" fill="none" stroke="#d3a625" stroke-width="2.5"></circle>

          <image href="{{ site.baseurl }}/assets/lessons/harry-potter-project-launch/crest-slytherin.png" x="185.2" y="185.2" width="64" height="64" preserveAspectRatio="xMidYMid slice" clip-path="url(#house-sorter-badge-slytherin)"></image>
          <circle cx="217.2" cy="217.2" r="32" fill="none" stroke="#d3a625" stroke-width="2.5"></circle>

          <image href="{{ site.baseurl }}/assets/lessons/harry-potter-project-launch/crest-hufflepuff.png" x="50.8" y="185.2" width="64" height="64" preserveAspectRatio="xMidYMid slice" clip-path="url(#house-sorter-badge-hufflepuff)"></image>
          <circle cx="82.8" cy="217.2" r="32" fill="none" stroke="#d3a625" stroke-width="2.5"></circle>

          <image href="{{ site.baseurl }}/assets/lessons/harry-potter-project-launch/crest-ravenclaw.png" x="50.8" y="50.8" width="64" height="64" preserveAspectRatio="xMidYMid slice" clip-path="url(#house-sorter-badge-ravenclaw)"></image>
          <circle cx="82.8" cy="82.8" r="32" fill="none" stroke="#d3a625" stroke-width="2.5"></circle>

          <circle cx="150" cy="150" r="16" fill="#d3a625" stroke="#2c2117" stroke-width="2"></circle>
        </g>
      </svg>
      <div class="house-sorter-sparkle-layer"></div>
    </div>

    <div class="house-sorter-reveal">
      <img class="house-sorter-owl" src="{{ site.baseurl }}/assets/lessons/harry-potter-project-launch/owl.png" alt="">
      <div class="house-sorter-reveal-card">
        <img class="house-sorter-reveal-crest" src="" alt="">
        <p class="house-sorter-result"></p>
      </div>
    </div>

    <button type="button" class="house-sorter-btn house-sorter-spin-btn">Spin for the next student</button>

    <div class="house-sorter-tally">
      <div class="house-sorter-tally-item" data-house="gryffindor"><span class="house-sorter-tally-swatch"></span>Gryffindor: <strong>0</strong></div>
      <div class="house-sorter-tally-item" data-house="slytherin"><span class="house-sorter-tally-swatch"></span>Slytherin: <strong>0</strong></div>
      <div class="house-sorter-tally-item" data-house="hufflepuff"><span class="house-sorter-tally-swatch"></span>Hufflepuff: <strong>0</strong></div>
      <div class="house-sorter-tally-item" data-house="ravenclaw"><span class="house-sorter-tally-swatch"></span>Ravenclaw: <strong>0</strong></div>
    </div>

    <button type="button" class="house-sorter-btn house-sorter-btn-secondary house-sorter-reset-btn" hidden>Sort a different class</button>
  </div>
</div>

<script>
(function () {
  var BASEURL = '{{ site.baseurl }}';
  var ASSET_PATH = BASEURL + '/assets/lessons/harry-potter-project-launch/';
  var HOUSES = ['gryffindor', 'slytherin', 'hufflepuff', 'ravenclaw'];
  var HOUSE_NAMES = { gryffindor: 'Gryffindor', slytherin: 'Slytherin', hufflepuff: 'Hufflepuff', ravenclaw: 'Ravenclaw' };
  var HOUSE_MID_ANGLES = { gryffindor: 45, slytherin: 135, hufflepuff: 225, ravenclaw: 315 };
  var HOUSE_COLORS = { gryffindor: '#ffb84d', slytherin: '#6fd89a', hufflepuff: '#ffd75e', ravenclaw: '#9db4ff' };
  var HOUSE_CRESTS = {
    gryffindor: ASSET_PATH + 'crest-gryffindor.png',
    slytherin: ASSET_PATH + 'crest-slytherin.png',
    hufflepuff: ASSET_PATH + 'crest-hufflepuff.png',
    ravenclaw: ASSET_PATH + 'crest-ravenclaw.png'
  };

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  function buildAssignments(n) {
    var base = Math.floor(n / 4);
    var remainder = n % 4;
    var extraHouses = shuffle(HOUSES.slice()).slice(0, remainder);
    var pool = [];
    HOUSES.forEach(function (h) {
      var count = base + (extraHouses.indexOf(h) !== -1 ? 1 : 0);
      for (var i = 0; i < count; i++) pool.push(h);
    });
    return shuffle(pool);
  }

  document.querySelectorAll('.house-sorter').forEach(function (root) {
    var setup = root.querySelector('.house-sorter-setup');
    var stage = root.querySelector('.house-sorter-stage');
    var countInput = root.querySelector('.house-sorter-input');
    var startBtn = root.querySelector('.house-sorter-start-btn');
    var spinBtn = root.querySelector('.house-sorter-spin-btn');
    var resetBtn = root.querySelector('.house-sorter-reset-btn');
    var disc = root.querySelector('.house-sorter-wheel-disc');
    var owl = root.querySelector('.house-sorter-owl');
    var revealCard = root.querySelector('.house-sorter-reveal-card');
    var revealCrest = root.querySelector('.house-sorter-reveal-crest');
    var resultEl = root.querySelector('.house-sorter-result');
    var progressEl = root.querySelector('.house-sorter-progress');
    var sparkleLayer = root.querySelector('.house-sorter-sparkle-layer');
    var tallyEls = {};
    root.querySelectorAll('.house-sorter-tally-item').forEach(function (el) {
      tallyEls[el.getAttribute('data-house')] = el.querySelector('strong');
    });

    var assignments = [];
    var index = 0;
    var total = 0;
    var currentRotation = 0;
    var tally = { gryffindor: 0, slytherin: 0, hufflepuff: 0, ravenclaw: 0 };
    var spinning = false;

    function updateProgress() {
      if (index >= total) return;
      progressEl.textContent = 'Student ' + (index + 1) + ' of ' + total;
    }

    function updateTally() {
      HOUSES.forEach(function (h) {
        if (tallyEls[h]) tallyEls[h].textContent = tally[h];
      });
    }

    function spawnSparkles(color) {
      sparkleLayer.innerHTML = '';
      var colors = [color, '#d3a625', '#ffffff'];
      for (var i = 0; i < 80; i++) {
        var piece = document.createElement('span');
        piece.className = 'house-sorter-sparkle';
        var angle = Math.random() * Math.PI * 2;
        var dist = 90 + Math.random() * 220;
        var size = 5 + Math.random() * 10;
        piece.style.color = colors[i % colors.length];
        piece.style.backgroundColor = colors[i % colors.length];
        piece.style.setProperty('--x', (Math.cos(angle) * dist) + 'px');
        piece.style.setProperty('--y', (Math.sin(angle) * dist) + 'px');
        piece.style.setProperty('--size', size + 'px');
        piece.style.animationDelay = (Math.random() * 0.25) + 's';
        sparkleLayer.appendChild(piece);
      }
      setTimeout(function () { sparkleLayer.innerHTML = ''; }, 2000);
    }

    function startSorting() {
      var n = parseInt(countInput.value, 10);
      if (!n || n < 1) {
        countInput.focus();
        return;
      }
      if (n > 200) n = 200;
      assignments = buildAssignments(n);
      total = n;
      index = 0;
      tally = { gryffindor: 0, slytherin: 0, hufflepuff: 0, ravenclaw: 0 };
      updateTally();
      resultEl.textContent = '';
      resultEl.className = 'house-sorter-result';
      revealCard.classList.remove('is-visible');
      owl.classList.remove('is-flying');
      setup.hidden = true;
      stage.hidden = false;
      spinBtn.hidden = false;
      resetBtn.hidden = true;
      updateProgress();
    }

    function spin() {
      if (spinning || index >= total) return;
      spinning = true;
      spinBtn.disabled = true;
      revealCard.classList.remove('is-visible');
      owl.classList.remove('is-flying');

      var house = assignments[index];
      var slotStart = HOUSE_MID_ANGLES[house] - 45;
      var targetAngle = slotStart + 10 + Math.random() * 70;
      var requiredMod = (360 - targetAngle) % 360;
      var base = Math.floor(currentRotation / 360) * 360;
      var candidate = base + requiredMod;
      while (candidate <= currentRotation) candidate += 360;
      candidate += 360 * 4;
      currentRotation = candidate;

      disc.style.transition = 'transform 3.2s cubic-bezier(.17,.67,.16,1)';
      disc.style.transform = 'rotate(' + currentRotation + 'deg)';

      setTimeout(function () {
        spinning = false;
        spinBtn.disabled = false;
        tally[house]++;
        updateTally();

        revealCrest.src = HOUSE_CRESTS[house];
        revealCrest.alt = HOUSE_NAMES[house] + ' crest';
        resultEl.textContent = HOUSE_NAMES[house] + '!';
        resultEl.className = 'house-sorter-result house-' + house;

        void owl.offsetWidth;
        owl.classList.add('is-flying');
        spawnSparkles(HOUSE_COLORS[house]);

        setTimeout(function () {
          revealCard.classList.add('is-visible');
        }, 550);

        index++;
        if (index >= total) {
          spinBtn.hidden = true;
          resetBtn.hidden = false;
          progressEl.textContent = 'All ' + total + ' students sorted!';
        } else {
          updateProgress();
        }
      }, 3300);
    }

    function reset() {
      setup.hidden = false;
      stage.hidden = true;
      disc.style.transition = 'none';
      disc.style.transform = 'rotate(0deg)';
      currentRotation = 0;
      revealCard.classList.remove('is-visible');
      owl.classList.remove('is-flying');
      countInput.value = '';
      countInput.focus();
    }

    startBtn.addEventListener('click', startSorting);
    spinBtn.addEventListener('click', spin);
    resetBtn.addEventListener('click', reset);
    countInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') startSorting();
    });
  });
})();
</script>
