<div class="lesson-phase-item">
  <p class="lesson-phase-title"><strong>{{ include.phase.label }}</strong></p>
  {% if include.phase.goal %}<p class="lesson-phase-goal"><strong>Goal:</strong> {{ include.phase.goal }}</p>{% endif %}
  {% if include.phase.text %}<p>{{ include.phase.text }}</p>{% endif %}
  {% if include.phase.items %}
  <ul class="lesson-goals-list">
    {% for item in include.phase.items %}<li>{{ item }}</li>{% endfor %}
  </ul>
  {% endif %}
</div>
