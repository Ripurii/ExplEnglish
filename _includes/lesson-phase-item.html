{% assign phase = include.phase %}
<div class="lesson-phase-item">
  <p class="lesson-phase-title"><strong>{{ phase.label }}</strong></p>
  {% if phase.goal %}<p class="lesson-phase-goal"><strong>Goal:</strong> {{ phase.goal }}</p>{% endif %}
  {% if phase.text %}<p>{{ phase.text }}</p>{% endif %}
  {% if phase.items %}
  <ul class="lesson-goals-list">
    {% for item in phase.items %}<li>{{ item }}</li>{% endfor %}
  </ul>
  {% endif %}
</div>
