<div class="wyr-wheel">
  <p class="wyr-progress"></p>

  <div class="wyr-wheel-wrap">
    <div class="wyr-pointer"></div>
    <svg class="wyr-wheel-svg" viewBox="0 0 300 300" aria-hidden="true">
      <g class="wyr-disc"></g>
    </svg>
    <div class="wyr-sparkle-layer"></div>
  </div>

  <button type="button" class="wyr-btn wyr-spin-btn">Spin</button>

  <div class="wyr-reveal">
    <p class="wyr-reveal-label">Would you rather...</p>
    <div class="wyr-options">
      <div class="wyr-option wyr-option-a"></div>
      <div class="wyr-option-divider">or</div>
      <div class="wyr-option wyr-option-b"></div>
    </div>
  </div>
</div>

<script>
(function () {
  var PROMPTS = {{ site.data.would_you_rather | jsonify }};
  var COLORS = ['#ad4a2f', '#7c8f5f', '#5c6e82', '#bd7f35'];
  var CX = 150, CY = 150, R = 145, TEXT_R = 95;

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  function polar(cx, cy, r, angleDeg) {
    var rad = angleDeg * Math.PI / 180;
    return { x: cx + r * Math.sin(rad), y: cy - r * Math.cos(rad) };
  }

  function svgEl(tag, attrs) {
    var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (var key in attrs) el.setAttribute(key, attrs[key]);
    return el;
  }

  function truncate(str, maxChars) {
    if (str.length <= maxChars) return str;
    return str.slice(0, Math.max(1, maxChars - 1)) + '…';
  }

  document.querySelectorAll('.wyr-wheel').forEach(function (root) {
    var disc = root.querySelector('.wyr-disc');
    var spinBtn = root.querySelector('.wyr-spin-btn');
    var reveal = root.querySelector('.wyr-reveal');
    var optionA = root.querySelector('.wyr-option-a');
    var optionB = root.querySelector('.wyr-option-b');
    var progressEl = root.querySelector('.wyr-progress');
    var sparkleLayer = root.querySelector('.wyr-sparkle-layer');

    var total = PROMPTS.length;
    var deck = shuffle(PROMPTS.slice());
    var spinning = false;

    function updateProgress() {
      if (!total) {
        progressEl.textContent = '';
        return;
      }
      if (deck.length === 0) {
        progressEl.textContent = 'All done! Refresh the page to spin again.';
      } else {
        progressEl.textContent = deck.length + ' of ' + total + ' left this round';
      }
    }

    function renderWheel() {
      disc.innerHTML = '';

      if (deck.length === 0) {
        disc.appendChild(svgEl('circle', { cx: CX, cy: CY, r: R, fill: '#e7dcbf' }));
        var msg = svgEl('text', {
          x: CX, y: CY, 'text-anchor': 'middle', 'dominant-baseline': 'middle',
          class: 'wyr-slice-text wyr-slice-text-done'
        });
        msg.textContent = 'All done!';
        disc.appendChild(msg);
        return;
      }

      var sliceAngle = 360 / deck.length;
      var sliceRad = sliceAngle * Math.PI / 180;
      var availableWidth = TEXT_R * sliceRad;
      var fontSize = Math.max(6, Math.min(13, availableWidth / 4.2));
      var maxChars = Math.max(4, Math.floor(availableWidth / (fontSize * 0.6)));

      deck.forEach(function (prompt, i) {
        var a0 = i * sliceAngle;
        var a1 = a0 + sliceAngle;
        var p1 = polar(CX, CY, R, a0);
        var p2 = polar(CX, CY, R, a1);
        var largeArc = sliceAngle > 180 ? 1 : 0;
        var path = svgEl('path', {
          d: 'M' + CX + ',' + CY + ' L' + p1.x + ',' + p1.y + ' A' + R + ',' + R + ' 0 ' + largeArc + ',1 ' + p2.x + ',' + p2.y + ' Z',
          fill: COLORS[i % COLORS.length]
        });
        disc.appendChild(path);

        var mid = a0 + sliceAngle / 2;
        var tp = polar(CX, CY, TEXT_R, mid);
        var rot = (mid > 90 && mid < 270) ? mid - 180 : mid;
        var text = svgEl('text', {
          x: tp.x, y: tp.y,
          transform: 'rotate(' + rot + ' ' + tp.x + ' ' + tp.y + ')',
          class: 'wyr-slice-text',
          'font-size': fontSize
        });
        var line1 = svgEl('tspan', { x: tp.x, dy: '-0.35em' });
        line1.textContent = truncate(prompt.a, maxChars);
        var line2 = svgEl('tspan', { x: tp.x, dy: '1.15em' });
        line2.textContent = truncate(prompt.b, maxChars);
        text.appendChild(line1);
        text.appendChild(line2);
        disc.appendChild(text);
      });

      var divider = deck.length > 1;
      if (divider) {
        deck.forEach(function (prompt, i) {
          var a0 = i * sliceAngle;
          var p1 = polar(CX, CY, R, a0);
          disc.appendChild(svgEl('line', {
            x1: CX, y1: CY, x2: p1.x, y2: p1.y, stroke: '#fff', 'stroke-width': 2
          }));
        });
      }

      disc.appendChild(svgEl('circle', { cx: CX, cy: CY, r: R, fill: 'none', stroke: '#fff', 'stroke-width': 6 }));
    }

    function spawnSparkles() {
      sparkleLayer.innerHTML = '';
      for (var i = 0; i < 40; i++) {
        var piece = document.createElement('span');
        piece.className = 'wyr-sparkle';
        var angle = Math.random() * Math.PI * 2;
        var dist = 70 + Math.random() * 130;
        var size = 5 + Math.random() * 8;
        var color = COLORS[i % COLORS.length];
        piece.style.color = color;
        piece.style.backgroundColor = color;
        piece.style.setProperty('--x', (Math.cos(angle) * dist) + 'px');
        piece.style.setProperty('--y', (Math.sin(angle) * dist) + 'px');
        piece.style.setProperty('--size', size + 'px');
        piece.style.animationDelay = (Math.random() * 0.2) + 's';
        sparkleLayer.appendChild(piece);
      }
      setTimeout(function () { sparkleLayer.innerHTML = ''; }, 1800);
    }

    function spin() {
      if (spinning || deck.length === 0) return;
      spinning = true;
      spinBtn.disabled = true;
      reveal.classList.remove('is-visible');

      var idx = Math.floor(Math.random() * deck.length);
      var sliceAngle = 360 / deck.length;
      var slotStart = idx * sliceAngle;
      var margin = Math.min(sliceAngle * 0.15, 8);
      var targetAngle = slotStart + margin + Math.random() * (sliceAngle - margin * 2);
      var requiredMod = (360 - targetAngle) % 360;
      var rotation = 360 * 4 + requiredMod;

      disc.style.transition = 'transform 3.2s cubic-bezier(.17,.67,.16,1)';
      disc.style.transform = 'rotate(' + rotation + 'deg)';

      setTimeout(function () {
        var prompt = deck[idx];
        deck.splice(idx, 1);

        optionA.textContent = prompt.a;
        optionB.textContent = prompt.b;
        reveal.classList.add('is-visible');
        spawnSparkles();
        updateProgress();

        disc.style.transition = 'none';
        disc.style.transform = 'rotate(0deg)';
        void disc.getBoundingClientRect();
        renderWheel();

        spinning = false;
        spinBtn.disabled = deck.length === 0;
      }, 3300);
    }

    if (total) {
      renderWheel();
      updateProgress();
      spinBtn.addEventListener('click', spin);
    } else {
      spinBtn.disabled = true;
      progressEl.textContent = 'No prompts yet -- add some to _data/would_you_rather.yml';
    }
  });
})();
</script>
