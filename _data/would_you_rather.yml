# Prompts for the "Would You Rather..." spinning wheel
# (lessons/would-you-rather/lesson-1.html, via _includes/would-you-rather-wheel.html).
#
# To add a new prompt, just add another "- a: ... / b: ..." pair below.
# No code changes needed -- the wheel picks these up automatically.

- a: "ski"
  b: "swim"
- a: "have a cat"
  b: "have a dog"
- a: "ask questions"
  b: "give answers"
- a: "have a fish"
  b: "have a hamster"
- a: "go to the future"
  b: "go to the past"
- a: "explore the deep sea"
  b: "explore space"
- a: "have unlimited time"
  b: "have unlimited money"
- a: "only eat sweet food"
  b: "only eat savoury food"
- a: "whisper all the time"
  b: "shout all the time"
- a: "say every thought out loud"
  b: "never share a thought"
- a: "be the funniest person in the room"
  b: "be the smartest person in the room"
- a: "have no more homework"
  b: "have no more tests"
- a: "live in a world with no crime"
  b: "live in a world with no disease"
- a: "never be angry"
  b: "never be sad"
- a: "always be cold"
  b: "always be hot"
- a: "always wear shoes"
  b: "never wear shoes"
- a: "never laugh again"
  b: "never cry again"
- a: "live in a treehouse"
  b: "live on a boat"
- a: "have unlimited wifi"
  b: "have unlimited battery"
